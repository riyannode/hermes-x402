name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]' build
      - name: Test
        run: python -m pytest -q
      - name: Lint
        run: python -m ruff check .
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Build package
        run: python -m build
      - name: Import smoke test
        run: >-
          python -c
          "from hermes_x402 import CircleDcwBuyerBackend, X402BuyerService, X402BuyerTool, X402HermesAgent, X402Config, create_buyer_tool; print('import-smoke-ok')"
